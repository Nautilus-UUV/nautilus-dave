[pytest]
# Marker registry mirrors py_pkg's. `sim` gates Tier 3 tests that need
# dave_robot_models artifacts (templates, canonical SDFs) installed —
# they don't actually spin up Gazebo but they depend on sim-side share
# dirs, so they stay out of any non-sim test run.
markers =
    sim: Tier 3 — depends on sim-side artifacts (SDFs, templates, dave_robot_models share). Opt in with: pytest -m sim test/

addopts = -m "not sim"
